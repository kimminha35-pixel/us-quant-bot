name: US Quant Daily Bot

on:
  schedule:
    - cron: '0 22 * * 0-4' # 🌟 1-5를 0-4로 변경!
  workflow_dispatch:

env: # 🌟 여기에 넣으면 모든 단계에서 경고가 사라집니다!
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4 
    - name: 파이썬 3.10 세팅
      uses: actions/setup-python@v5 
      with:
        python-version: '3.10'
    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: AI 봇 실행 및 텔레그램 전송
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py
    - name: 학습 데이터(history.csv) 깃허브에 자동 저장
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add history.csv
        git commit -m "Auto-update AI history data" || echo "No changes to commit"
        git push
