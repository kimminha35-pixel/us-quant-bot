name: US Quant Daily Bot

on:
  schedule:
    - cron: '0 22 * * *' # 매일 한국 시간 오전 7시
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 3.10 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: AI 봇 실행 및 텔레그램 전송
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python main.py

    - name: 학습 데이터(history.csv) 깃허브에 자동 저장
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add history.csv
        # 변경된 사항이 있을 때만 커밋하도록 예외 처리
        git commit -m "Auto-update AI history data" || echo "No changes to commit"
        git push
